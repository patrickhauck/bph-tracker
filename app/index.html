<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BPH Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>BPH Tracker</title>
<style>
:root{
  --bg:#f4f6f8; --card:#ffffff; --ink:#1a2330; --sub:#5b6b7d; --line:#e2e8ef;
  --acc:#2563eb; --acc2:#dbeafe; --good:#059669; --warn:#d97706; --bad:#dc2626;
  --night:#4c1d95; --night2:#ede9fe; --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px}
body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;margin:0;font-weight:700}
header .sub{font-size:12px;color:var(--sub)}
main{padding:14px;max-width:760px;margin:0 auto}
.view{display:none}
.view.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card h2{font-size:15px;margin:0 0 10px;font-weight:700}
.card h3{font-size:13px;margin:14px 0 6px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}
.muted{color:var(--sub);font-size:13px}
.small{font-size:12px}
/* quick-add buttons */
.qgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.qbtn{border:none;border-radius:var(--r);padding:16px 8px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px}
.qbtn span.ico{font-size:26px;line-height:1}
.qb-void{background:var(--acc)} .qb-fluid{background:#0891b2} .qb-med{background:#7c3aed}
/* timeline */
.tl-item{display:flex;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);align-items:center;cursor:pointer}
.tl-item:last-child{border-bottom:none}
.tl-time{font-weight:700;font-size:14px;min-width:58px}
.tl-ico{font-size:20px;min-width:26px;text-align:center}
.tl-body{flex:1;font-size:14px}
.tl-body .d{color:var(--sub);font-size:12px}
.tl-night{background:var(--night2);border-radius:8px}
/* buttons */
.btn{display:inline-block;border:none;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:600;cursor:pointer;
  background:var(--acc);color:#fff}
.btn.sec{background:var(--acc2);color:var(--acc)}
.btn.ghost{background:transparent;color:var(--acc);border:1px solid var(--acc)}
.btn.danger{background:#fee2e2;color:var(--bad)}
.btn.sm{padding:8px 12px;font-size:13px}
.btn.wide{display:block;width:100%;text-align:center}
.btnrow{display:flex;gap:8px;margin-top:12px}
.btnrow .btn{flex:1;text-align:center}
/* form */
label.f{display:block;font-size:13px;font-weight:600;color:var(--sub);margin:12px 0 5px}
input[type=text],input[type=number],input[type=time],input[type=date],input[type=datetime-local],select,textarea{
  width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:var(--bg);color:var(--ink);
  font-family:inherit}
textarea{resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* segmented */
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg button{flex:1;min-width:40px;padding:10px 4px;border:1px solid var(--line);background:var(--card);border-radius:10px;
  font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
.seg button.on{background:var(--acc);border-color:var(--acc);color:#fff}
.seg.night button.on{background:var(--night);border-color:var(--night)}
/* toggle row */
.tog{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.tog:last-child{border-bottom:none}
.tog .lbl{font-size:14px;font-weight:500;padding-right:10px}
.sw{position:relative;width:50px;height:30px;border-radius:15px;background:#cbd5e1;border:none;cursor:pointer;flex-shrink:0;transition:background .15s}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s}
.sw.on{background:var(--good)}
.sw.on::after{left:23px}
/* chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub)}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
/* modal */
#modalBack{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100}
#modalBack.open{display:block}
#modal{position:fixed;left:0;right:0;bottom:0;max-height:92vh;overflow-y:auto;background:var(--card);z-index:101;
  border-radius:20px 20px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto;
  transform:translateY(105%);transition:transform .2s}
#modalBack.open #modal{transform:none}
#modal h2{margin:0 0 4px;font-size:18px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mhead .x{border:none;background:var(--bg);border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--sub)}
/* nav */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);z-index:60;
  display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:9px 0 7px;font-size:10.5px;font-weight:600;color:var(--sub);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px}
nav button .ico{font-size:21px;line-height:1}
nav button.active{color:var(--acc)}
/* metrics */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:var(--bg);border-radius:12px;padding:12px}
.metric .v{font-size:22px;font-weight:800}
.metric .l{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.metric.hl{background:var(--night2)} .metric.hl .v{color:var(--night)}
/* tables */
table.rep{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
table.rep th,table.rep td{border:1px solid var(--line);padding:5px 6px;text-align:left}
table.rep th{background:var(--bg);font-weight:700}
.scorebig{font-size:34px;font-weight:800;text-align:center}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.b-mild{background:#d1fae5;color:var(--good)} .b-mod{background:#fef3c7;color:var(--warn)} .b-sev{background:#fee2e2;color:var(--bad)}
.redflag{background:#fef2f2;border:1px solid #fecaca}
.redflag li{margin:4px 0;font-size:13px}
svg.chart{width:100%;height:auto;display:block}
.day-hdr{font-size:13px;font-weight:700;color:var(--sub);margin:14px 0 4px;padding-bottom:4px;border-bottom:2px solid var(--line)}
/* med template staging */
.stage-item{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.stage-item input{padding:8px}
.stage-item .rm{border:none;background:#fee2e2;color:var(--bad);border-radius:8px;width:34px;height:34px;font-size:15px;cursor:pointer;flex-shrink:0}
.empty{text-align:center;color:var(--sub);padding:24px 10px;font-size:14px}
/* print */
#printArea{display:none}
@media print{
  body{background:#fff;padding:0}
  body>*{display:none !important}
  #printArea{display:block !important;color:#000}
  #printArea h1{font-size:20px} #printArea h2{font-size:15px;margin:16px 0 6px;border-bottom:1px solid #999;padding-bottom:3px}
  #printArea table{width:100%;border-collapse:collapse;font-size:10px;page-break-inside:auto}
  #printArea th,#printArea td{border:1px solid #999;padding:3px 5px;text-align:left}
  #printArea th{background:#eee}
  #printArea .pm{display:inline-block;margin:0 18px 8px 0;font-size:12px}
  #printArea .pm b{font-size:16px}
}
</style>
</head>
<body>
<header>
  <div onclick="go('log')" style="cursor:pointer">
    <h1>BPH Tracker</h1>
    <div class="sub" id="hdrSub"></div>
  </div>
  <div>
    <button class="btn sm sec" onclick="go('log')">&#8962; Home</button>
    <button class="btn sm sec" onclick="go('report')">Report</button>
  </div>
</header>

<main>
  <div id="view-log" class="view active"></div>
  <div id="view-daily" class="view"></div>
  <div id="view-night" class="view"></div>
  <div id="view-report" class="view"></div>
  <div id="view-more" class="view"></div>
</main>

<nav>
  <button id="nav-log" onclick="go('log')"><span class="ico">&#128167;</span>Log</button>
  <button id="nav-daily" onclick="go('daily')"><span class="ico">&#9728;&#65039;</span>Daily</button>
  <button id="nav-night" onclick="go('night')"><span class="ico">&#127769;</span>Night</button>
  <button id="nav-report" onclick="go('report')"><span class="ico">&#128202;</span>Report</button>
  <button id="nav-more" onclick="go('more')"><span class="ico">&#9881;&#65039;</span>More</button>
</nav>

<div id="modalBack" onclick="if(event.target===this)closeModal()">
  <div id="modal"></div>
</div>

<div id="printArea"></div>

<script>
"use strict";
/* ---------- state ---------- */
const KEY='bphdata_v1';
function blank(){return {voids:[],fluids:[],doses:[],meds:[],templates:[],daily:{},nights:{},ipss:[],priorities:{},settings:{unit:'ml'}}}
let S=load();
function load(){try{const d=JSON.parse(localStorage.getItem(KEY));return d?Object.assign(blank(),d):blank()}catch(e){return blank()}}
function persist(){localStorage.setItem(KEY,JSON.stringify(S))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

/* ---------- date helpers ---------- */
function nowISO(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}
function todayStr(){return nowISO().slice(0,10)}
function fmtT(iso){if(!iso)return'';let h=+iso.slice(11,13),m=iso.slice(14,16);const ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap}
function fmtD(ds){if(!ds)return'';const[y,m,d]=ds.split('-');return new Date(+y,+m-1,+d).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function addDays(ds,n){const[y,m,d]=ds.split('-').map(Number);const dt=new Date(y,m-1,d+n);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function isNightTime(iso){const h=+iso.slice(11,13);return h>=22||h<7}
function mins(iso){return new Date(iso.slice(0,10)+'T'+iso.slice(11,16)).getTime()/60000}

/* ---------- units ---------- */
const OZ=29.5735;
function ml2disp(ml){return S.settings.unit==='oz'?Math.round(ml/OZ*10)/10:Math.round(ml)}
function unitLbl(){return S.settings.unit==='oz'?'oz':'mL'}
function disp2ml(v){return S.settings.unit==='oz'?Math.round(v*OZ):Math.round(v)}

/* ---------- widgets ---------- */
function segHTML(id,opts,val,cls){return '<div class="seg '+(cls||'')+'" id="'+id+'" data-val="'+(val==null?'':val)+'">'+
  opts.map((o,i)=>'<button type="button" class="'+(i===val?'on':'')+'" data-v="'+i+'" onclick="segPick(\''+id+'\','+i+')">'+o+'</button>').join('')+'</div>'}
function segPick(id,v){const el=document.getElementById(id);el.dataset.val=v;
  [...el.children].forEach(b=>b.classList.toggle('on',+b.dataset.v===v))}
function segVal(id,def){const el=document.getElementById(id);if(!el)return def;const v=el.dataset.val;return v===''?def:+v}
function togHTML(id,label,on){return '<div class="tog"><span class="lbl">'+label+'</span>'+
  '<button type="button" class="sw'+(on?' on':'')+'" id="'+id+'" onclick="this.classList.toggle(\'on\')"></button></div>'}
function togVal(id){const el=document.getElementById(id);return el?el.classList.contains('on'):false}
function val(id){const el=document.getElementById(id);return el?el.value:''}
function setChip(el,groupSel,inputId,v){document.querySelectorAll(groupSel+' .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');document.getElementById(inputId).value=v}

/* ---------- navigation ---------- */
const VIEWS=['log','daily','night','report','more'];
function go(v){VIEWS.forEach(x=>{document.getElementById('view-'+x).classList.toggle('active',x===v);
  document.getElementById('nav-'+x).classList.toggle('active',x===v)});
  render(v);window.scrollTo(0,0)}
function render(v){({log:renderLog,daily:renderDaily,night:renderNight,report:renderReport,more:renderMore})[v]()}
function refresh(){const v=VIEWS.find(x=>document.getElementById('view-'+x).classList.contains('active'));render(v);hdr()}
function hdr(){const t=todayStr();const nv=S.voids.filter(x=>x.t.slice(0,10)===t).length;
  const fl=S.fluids.filter(x=>x.t.slice(0,10)===t).reduce((a,b)=>a+b.ml,0);
  document.getElementById('hdrSub').textContent=fmtD(t)+' · '+nv+' voids · '+ml2disp(fl)+' '+unitLbl()+' in'}

/* ---------- modal ---------- */
function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modalBack').classList.add('open')}
function closeModal(){document.getElementById('modalBack').classList.remove('open')}
function mhead(title){return '<div class="mhead"><h2>'+title+'</h2><button class="x" onclick="closeModal()">&#10005;</button></div>'}

/* ---------- LOG VIEW ---------- */
function renderLog(){
  const t=todayStr();
  const items=[
    ...S.voids.map(x=>({k:'v',t:x.t,o:x})),
    ...S.fluids.map(x=>({k:'f',t:x.t,o:x})),
    ...S.doses.map(x=>({k:'m',t:x.t,o:x}))
  ].sort((a,b)=>b.t.localeCompare(a.t));
  const days={};
  items.forEach(i=>{const d=i.t.slice(0,10);(days[d]=days[d]||[]).push(i)});
  const dayKeys=Object.keys(days).sort().reverse().slice(0,4);
  let h='<div class="qgrid">'+
    '<button class="qbtn qb-void" onclick="voidForm()"><span class="ico">&#128167;</span>Void</button>'+
    '<button class="qbtn qb-fluid" onclick="fluidForm()"><span class="ico">&#129380;</span>Fluid</button>'+
    '<button class="qbtn qb-med" onclick="medMenu()"><span class="ico">&#128138;</span>Meds</button></div>';
  if(!items.length){h+='<div class="card"><div class="empty">Nothing logged yet.<br>Tap a button above to record your first entry.</div></div>'}
  dayKeys.forEach(d=>{
    h+='<div class="day-hdr">'+fmtD(d)+(d===t?' — Today':'')+'</div><div class="card">';
    days[d].forEach(i=>{h+=tlRow(i)});
    h+='</div>';
  });
  document.getElementById('view-log').innerHTML=h;hdr();
}
function tlRow(i){
  const o=i.o;
  if(i.k==='v'){
    const flags=[o.strain?'strained':'',o.incomplete?'not empty':'',o.pain?'&#9888;&#65039; pain/blood':''].filter(Boolean).join(' · ');
    return '<div class="tl-item'+(o.night?' tl-night':'')+'" onclick="voidForm(\''+o.id+'\')">'+
      '<span class="tl-time">'+fmtT(o.t)+'</span><span class="tl-ico">'+(o.night?'&#127769;':'&#128167;')+'</span>'+
      '<div class="tl-body"><b>'+(o.ml?ml2disp(o.ml)+' '+unitLbl():'no volume')+'</b> · urgency '+o.urg+' · stream '+o.stream+
      (flags?'<div class="d">'+flags+'</div>':'')+ (o.night&&o.woke?'<div class="d">bladder woke me'+(o.backToSleep?', slept again quickly':'')+'</div>':'')+'</div></div>';
  }
  if(i.k==='f'){
    const tags=[o.caff?'caffeine':'',o.alc?'alcohol':''].filter(Boolean).join(' · ');
    return '<div class="tl-item" onclick="fluidForm(\''+o.id+'\')">'+
      '<span class="tl-time">'+fmtT(o.t)+'</span><span class="tl-ico">&#129380;</span>'+
      '<div class="tl-body"><b>'+ml2disp(o.ml)+' '+unitLbl()+'</b> '+o.type+(tags?'<div class="d">'+tags+'</div>':'')+'</div></div>';
  }
  return '<div class="tl-item" onclick="doseForm(\''+o.id+'\')">'+
    '<span class="tl-time">'+fmtT(o.t)+'</span><span class="tl-ico">&#128138;</span>'+
    '<div class="tl-body"><b>'+o.name+'</b> '+(o.dose||'')+(o.missed?' · <span style="color:var(--bad)">missed</span>':'')+
    (o.fx?'<div class="d">'+o.fx+'</div>':'')+'</div></div>';
}

/* ---------- VOID form ---------- */
function voidForm(id){
  const e=id?S.voids.find(x=>x.id===id):null;
  const t=e?e.t:nowISO();
  const night=e?e.night:isNightTime(t);
  openModal(mhead(e?'Edit void':'Log void')+
    '<label class="f">Time</label><input type="datetime-local" id="vT" value="'+t+'" onchange="autoNight()">'+
    '<label class="f">Volume ('+unitLbl()+')</label><input type="number" id="vMl" inputmode="decimal" value="'+(e&&e.ml?ml2disp(e.ml):'')+'" placeholder="measured in collection container">'+
    '<div class="chips">'+[100,150,200,250,300,400].map(m=>'<span class="chip" onclick="document.getElementById(\'vMl\').value=ml2disp('+m+')">'+ml2disp(m)+'</span>').join('')+'</div>'+
    '<label class="f">Urgency (0 none &rarr; 4 fear of leakage)</label>'+segHTML('vUrg',['0','1','2','3','4'],e?e.urg:null)+
    '<label class="f">Stream strength (0 none &rarr; 4 strong)</label>'+segHTML('vStr',['0','1','2','3','4'],e?e.stream:null)+
    '<div style="margin-top:12px">'+
    togHTML('vStrain','Straining / hesitancy',e?e.strain:false)+
    togHTML('vInc','Felt incomplete emptying',e?e.incomplete:false)+
    togHTML('vPain','Pain / burning / blood',e?e.pain:false)+
    togHTML('vNight','&#127769; Nighttime void (during sleep period)',night)+
    '</div><div id="nightExtra">'+nightExtraHTML(e,night)+'</div>'+
    '<label class="f">Notes</label><input type="text" id="vNote" value="'+esc(e?e.note:'')+'">'+
    '<div class="btnrow">'+(e?'<button class="btn danger" onclick="delItem(\'voids\',\''+id+'\')">Delete</button>':'')+
    '<button class="btn" onclick="saveVoid(\''+(id||'')+'\')">Save</button></div>');
  document.getElementById('vNight').addEventListener('click',()=>setTimeout(()=>{
    const ne=document.getElementById('nightExtra');
    if(ne)ne.innerHTML=nightExtraHTML(e,togVal('vNight'))},0));
}
function nightExtraHTML(e,night){return night?
  togHTML('vWoke','Did your bladder wake you?',e?e.woke!==false:true)+
  togHTML('vBack','Returned to sleep quickly?',e?!!e.backToSleep:false):''}
function autoNight(){const sw=document.getElementById('vNight');const should=isNightTime(val('vT'));
  if(sw.classList.contains('on')!==should)sw.click()}
function saveVoid(id){
  const o={id:id||uid(),t:val('vT'),ml:val('vMl')?disp2ml(+val('vMl')):0,
    urg:segVal('vUrg',0),stream:segVal('vStr',0),strain:togVal('vStrain'),incomplete:togVal('vInc'),
    pain:togVal('vPain'),night:togVal('vNight'),note:val('vNote')};
  if(o.night){o.woke=togVal('vWoke');o.backToSleep=togVal('vBack')}
  if(!o.t){alert('Time required');return}
  upsert('voids',o);closeModal();refresh();
}

/* ---------- FLUID form ---------- */
const FTYPES=['Water','Coffee','Tea','Alcohol','Soda','Sports drink','Juice','Milk','Other'];
const AUTO={Coffee:{c:1},Tea:{c:1},Alcohol:{a:1},Soda:{c:1}};
function fluidForm(id){
  const e=id?S.fluids.find(x=>x.id===id):null;
  openModal(mhead(e?'Edit fluid':'Log fluid')+
    '<label class="f">Time</label><input type="datetime-local" id="fT" value="'+(e?e.t:nowISO())+'">'+
    '<label class="f">Amount ('+unitLbl()+')</label><input type="number" id="fMl" inputmode="decimal" value="'+(e?ml2disp(e.ml):'')+'">'+
    '<div class="chips">'+[240,355,475,590].map(m=>'<span class="chip" onclick="document.getElementById(\'fMl\').value=ml2disp('+m+')">'+ml2disp(m)+' '+unitLbl()+'</span>').join('')+'</div>'+
    '<label class="f">Type</label><select id="fType" onchange="fluidAuto()">'+
    FTYPES.map(x=>'<option'+(e&&e.type===x?' selected':'')+'>'+x+'</option>').join('')+'</select>'+
    '<div style="margin-top:12px">'+
    togHTML('fCaff','Caffeine',e?e.caff:false)+
    togHTML('fAlc','Alcohol',e?e.alc:false)+'</div>'+
    '<div class="btnrow">'+(e?'<button class="btn danger" onclick="delItem(\'fluids\',\''+id+'\')">Delete</button>':'')+
    '<button class="btn" onclick="saveFluid(\''+(id||'')+'\')">Save</button></div>');
}
function fluidAuto(){const a=AUTO[val('fType')]||{};
  const c=document.getElementById('fCaff'),al=document.getElementById('fAlc');
  c.classList.toggle('on',!!a.c);al.classList.toggle('on',!!a.a)}
function saveFluid(id){
  const o={id:id||uid(),t:val('fT'),ml:disp2ml(+val('fMl')||0),type:val('fType'),caff:togVal('fCaff'),alc:togVal('fAlc')};
  if(!o.t||!o.ml){alert('Time and amount required');return}

function upsert(coll,o){const i=S[coll].findIndex(x=>x.id===o.id);if(i>=0)S[coll][i]=o;else S[coll].push(o);

function delItem(coll,id){if(!confirm('Delete this entry?'))return;

function calcSleep(){const b=val('ntBed'),w=val('ntWake');if(!b||!w)return;
  let bm=+b.slice(0,2)*60+ +b.slice(3),wm=+w.slice(0,2)*60+ +w.slice(3);
  let dur=wm-bm;if(dur<=0)dur+=1440;
  document.getElementById('ntTotal').value=Math.round(dur/6)/10}

    dryMouth:togVal('ntDry'),headache:togVal('ntHead'),sleepy:segVal('ntSleepy',null),
    quality:segVal('ntQual',null),naps:val('ntNaps')};
  persist();renderNight();window.scrollTo(0,0);
}
/* voids belonging to the night starting on date d */
function nightVoids(d){
  const n=S.nights[d];const next=addDays(d,1);
  let start,end;
  if(n&&n.bed&&n.wake){
    start=(+n.bed.slice(0,2)>=12?d:next)+'T'+n.bed;
    end=next+'T'+n.wake;
    if(start>end)end=addDays(next,0)+'T'+n.wake;
  }else{start=d+'T22:00';end=next+'T07:00'}
  return S.voids.filter(v=>v.t>=start&&v.t<=end&&(v.night||n));
}
/* ---------- ANALYTICS ---------- */
function rangeDates(){
  const el=document.getElementById('view-report');
  const days=+(el.dataset.days||3);
  const end=el.dataset.end||todayStr();
  const out=[];for(let i=days-1;i>=0;i--)out.push(addDays(end,-i));
  return out;
}
function nightStats(d){
  const nv=nightVoids(d);
  const n=S.nights[d];const next=addDays(d,1);
  let end=n&&n.wake?next+'T'+n.wake:next+'T07:00';
  const morning=S.voids.find(v=>v.t>end&&v.t<=next+'T23:59'&&!v.night);
  const noct=nv.reduce((a,b)=>a+(b.ml||0),0)+(morning?morning.ml||0:0);
  let start=n&&n.bed?((+n.bed.slice(0,2)>=12?d:next)+'T'+n.bed):d+'T22:00';
  const end24=addDays(start.slice(0,10),1)+'T'+start.slice(11,16);
  const tot24=S.voids.filter(v=>v.t>=start&&v.t<end24).reduce((a,b)=>a+(b.ml||0),0);
  return {wakes:nv.length,noct:noct,tot24:tot24,npi:tot24?noct/tot24:null};
}
function analytics(dates){
  const inR=x=>dates.includes(x.t.slice(0,10));
  const vs=S.voids.filter(inR),fs=S.fluids.filter(inR);
  const withVol=vs.filter(v=>v.ml>0);
  const perDay=dates.map(d=>{
    const dv=vs.filter(v=>v.t.slice(0,10)===d);
    return {d:d,count:dv.length,vol:dv.reduce((a,b)=>a+(b.ml||0),0),
      dayVol:dv.filter(v=>!v.night).reduce((a,b)=>a+(b.ml||0),0),
      nightVol:dv.filter(v=>v.night).reduce((a,b)=>a+(b.ml||0),0),
      fluid:fs.filter(f=>f.t.slice(0,10)===d).reduce((a,b)=>a+b.ml,0)};
  });
  const nights=dates.map(d=>({d:d,...nightStats(d)}));
  const npis=nights.filter(n=>n.npi!=null&&n.tot24>0);
  return {
    voids:vs,fluids:fs,perDay:perDay,nights:nights,
    totalVoids:vs.length,
    nightVoidsN:vs.filter(v=>v.night).length,
    maxVoid:withVol.length?Math.max(...withVol.map(v=>v.ml)):0,
    avgVoid:withVol.length?Math.round(withVol.reduce((a,b)=>a+b.ml,0)/withVol.length):0,
    avgUrg:vs.length?(vs.reduce((a,b)=>a+b.urg,0)/vs.length).toFixed(1):'—',
    avgStream:vs.length?(vs.reduce((a,b)=>a+b.stream,0)/vs.length).toFixed(1):'—',
    avgNPI:npis.length?npis.reduce((a,b)=>a+b.npi,0)/npis.length:null,
    caffN:fs.filter(f=>f.caff).length,alcN:fs.filter(f=>f.alc).length,
    fluidTotal:fs.reduce((a,b)=>a+b.ml,0)
  };
}

/* ---------- charts (inline SVG) ---------- */
function barChart(vals,labels,color,fmt){
  const W=680,H=200,P=28,max=Math.max(...vals,1);
  const bw=(W-P*2)/vals.length;
  let s='<svg class="chart" viewBox="0 0 '+W+' '+(H+30)+'" xmlns="http://www.w3.org/2000/svg">';
  vals.forEach((v,i)=>{
    const h=v/max*(H-P),x=P+i*bw,y=H-h;
    s+='<rect x="'+(x+bw*0.12)+'" y="'+y+'" width="'+bw*0.76+'" height="'+h+'" rx="4" fill="'+color+'"/>';
    if(v)s+='<text x="'+(x+bw/2)+'" y="'+(y-5)+'" font-size="11" text-anchor="middle" fill="#5b6b7d">'+(fmt?fmt(v):v)+'</text>';
    s+='<text x="'+(x+bw/2)+'" y="'+(H+16)+'" font-size="10" text-anchor="middle" fill="#5b6b7d">'+labels[i]+'</text>';
  });
  return s+'</svg>';
}
function stackChart(dayVals,nightVals,labels){
  const W=680,H=200,P=28,max=Math.max(...dayVals.map((v,i)=>v+nightVals[i]),1);
  const bw=(W-P*2)/dayVals.length;
  let s='<svg class="chart" viewBox="0 0 '+W+' '+(H+46)+'" xmlns="http://www.w3.org/2000/svg">';
  dayVals.forEach((v,i)=>{
    const nh=nightVals[i]/max*(H-P),dh=v/max*(H-P),x=P+i*bw;
    s+='<rect x="'+(x+bw*0.12)+'" y="'+(H-dh)+'" width="'+bw*0.76+'" height="'+dh+'" fill="#2563eb"/>';
    s+='<rect x="'+(x+bw*0.12)+'" y="'+(H-dh-nh)+'" width="'+bw*0.76+'" height="'+nh+'" rx="3" fill="#4c1d95"/>';
    const t=v+nightVals[i];
    if(t)s+='<text x="'+(x+bw/2)+'" y="'+(H-dh-nh-5)+'" font-size="11" text-anchor="middle" fill="#5b6b7d">'+ml2disp(t)+'</text>';
    s+='<text x="'+(x+bw/2)+'" y="'+(H+16)+'" font-size="10" text-anchor="middle" fill="#5b6b7d">'+labels[i]+'</text>';
  });
  s+='<rect x="'+P+'" y="'+(H+26)+'" width="10" height="10" fill="#2563eb"/><text x="'+(P+15)+'" y="'+(H+35)+'" font-size="11" fill="#5b6b7d">Day</text>';
  s+='<rect x="'+(P+60)+'" y="'+(H+26)+'" width="10" height="10" fill="#4c1d95"/><text x="'+(P+75)+'" y="'+(H+35)+'" font-size="11" fill="#5b6b7d">Night</text>';

const IPSSQ=[
 'Incomplete emptying — how often have you had the sensation of not emptying your bladder completely?',
 'Frequency — how often have you had to urinate again less than two hours after finishing?',
 'Intermittency — how often have you stopped and started again several times while urinating?',
 'Urgency — how often have you found it difficult to postpone urination?',
 'Weak stream — how often have you had a weak urinary stream?',
 'Straining — how often have you had to push or strain to begin urination?',
 'Nocturia — how many times did you typically get up at night to urinate?'];
const IPSSOPT=['0<br><span class="small">Not at all</span>','1<br><span class="small">&lt;1 in 5</span>','2<br><span class="small">&lt;half</span>','3<br><span class="small">~half</span>','4<br><span class="small">&gt;half</span>','5<br><span class="small">Almost always</span>'];
const IPSSOPT7=['0','1','2','3','4','5+'];
function ipssForm(){
  openModal(mhead('IPSS — over the past month')+
    IPSSQ.map((q,i)=>'<label class="f">'+(i+1)+'. '+q+'</label>'+segHTML('ip'+i,i===6?IPSSOPT7:IPSSOPT,null)).join('')+
    '<label class="f">Quality of life: if you were to spend the rest of your life with your urinary condition just the way it is now, how would you feel? (0 delighted &rarr; 6 terrible)</label>'+
    segHTML('ipQol',['0','1','2','3','4','5','6'],null)+
    '<div class="btnrow"><button class="btn" onclick="saveIPSS()">Calculate &amp; save</button></div>');
}
function saveIPSS(){
  let score=0;
  for(let i=0;i<7;i++){const v=segVal('ip'+i,null);
    if(v==null){alert('Please answer question '+(i+1));return}score+=v}
  const qol=segVal('ipQol',null);
  if(qol==null){alert('Please answer the quality-of-life question');return}
  S.ipss.push({d:todayStr(),score:score,qol:qol,answers:Array.from({length:7},(_,i)=>segVal('ip'+i,0))});
  persist();closeModal();renderMore();
}
function ipssBadge(s){return s<=7?'<span class="badge b-mild">Mild (0–7)</span>':s<=19?'<span class="badge b-mod">Moderate (8–19)</span>':'<span class="badge b-sev">Severe (20–35)</span>'}

/* ---------- EXPORT ---------- */
function dl(name,text,mime){
  const b=new Blob([text],{type:mime||'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500);
}
function csvEsc(v){v=(v==null?'':''+v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function rows2csv(head,rows){return [head,...rows].map(r=>r.map(csvEsc).join(',')).join('\n')}
function yn(b){return b?'Y':'N'}
function csvVoids(){return rows2csv(['date','time','volume_ml','urgency_0_4','stream_0_4','strained','incomplete_empty','pain_burning_blood','night_void','bladder_woke_me','back_to_sleep_quickly','notes'],
  S.voids.map(v=>[v.t.slice(0,10),v.t.slice(11,16),v.ml||'',v.urg,v.stream,yn(v.strain),yn(v.incomplete),yn(v.pain),yn(v.night),v.night?yn(v.woke):'',v.night?yn(v.backToSleep):'',v.note||'']))}
function csvFluids(){return rows2csv(['date','time','amount_ml','type','caffeine','alcohol'],
  S.fluids.map(f=>[f.t.slice(0,10),f.t.slice(11,16),f.ml,f.type,yn(f.caff),yn(f.alc)]))}
function csvDoses(){return rows2csv(['date','time','medication','dose','missed','side_effects'],
  S.doses.map(x=>[x.t.slice(0,10),x.t.slice(11,16),x.name,x.dose||'',yn(x.missed),x.fx||'']))}
function csvDaily(){return rows2csv(['date','dinner_time','dinner_salt_0low_2high','salty_snacks','late_dessert','evening_alcohol','leg_swelling_0_3','sock_marks_0_3','long_sitting','legs_elevated','compression_socks','bowel_movement','constipation','bristol_type','new_bowel_changes',...DAYSYM.map(s=>s.toLowerCase().replace(/[^a-z]+/g,'_')+'_0_5')],
  Object.keys(S.daily).sort().map(d=>{const e=S.daily[d];
    return [d,e.dinner||'',e.salt!=null?e.salt:'',yn(e.saltySnack),yn(e.dessert),e.eveAlc||'',e.leg!=null?e.leg:'',e.sock!=null?e.sock:'',yn(e.sitting),yn(e.elevated),yn(e.compression),yn(e.bm),yn(e.constipation),e.bristol!=null?e.bristol+1:'',yn(e.bowelNew),...(e.sym||[]).map(s=>s!=null?s:'')]}))}
function csvNights(){return rows2csv(['night_of','bedtime','tried_sleep','final_wake','est_sleep_hrs','snoring','gasping','dry_mouth','morning_headache','daytime_sleepiness_0_4','slept_well_0_4','naps'],
  Object.keys(S.nights).sort().map(d=>{const e=S.nights[d];
    return [d,e.bed||'',e.trySleep||'',e.wake||'',e.totalSleep!=null?e.totalSleep:'',yn(e.snore),yn(e.gasp),yn(e.dryMouth),yn(e.headache),e.sleepy!=null?e.sleepy:'',e.quality!=null?e.quality:'',e.naps||'']}))}
function exportCSV(which){
  const d=todayStr();
  if(which==='voids')dl('voids_'+d+'.csv',csvVoids());
  else if(which==='fluids')dl('fluids_'+d+'.csv',csvFluids());
  else if(which==='doses')dl('medications_'+d+'.csv',csvDoses());
  else dl('bph_all_data_'+d+'.csv',
    '--- VOIDING DIARY ---\n'+csvVoids()+'\n\n--- FLUID INTAKE ---\n'+csvFluids()+
    '\n\n--- MEDICATIONS ---\n'+csvDoses()+'\n\n--- DAILY CHECK-INS ---\n'+csvDaily()+
    '\n\n--- NIGHT SUMMARIES ---\n'+csvNights());
}
function backupJSON(){dl('bph_backup_'+todayStr()+'.json',JSON.stringify(S,null,1),'application/json')}
function importJSON(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!d.voids){alert('Not a valid backup file');return}
    if(!confirm('Replace ALL current data with this backup?'))return;
    S=Object.assign(blank(),d);persist();refresh();alert('Restored.');
  }catch(e){alert('Could not read file')}};
  r.readAsText(f);inp.value='';
}
function wipe(){if(!confirm('Erase ALL data on this device? Consider a backup first.'))return;
  if(!confirm('Are you sure? This cannot be undone.'))return;
  S=blank();persist();refresh()}
